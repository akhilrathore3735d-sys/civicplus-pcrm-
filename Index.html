function doLogin() {
  const u = document.getElementById('loginUser').value.trim();

  document.getElementById('appScreen').classList.add('active');

  document.getElementById('appScreen').classList.remove('active');

  currentPage = 'dashboard';

// ========================

function setupApp() {
  const r = roles[currentRole];
  const av = document.getElementById('sidebarAvatar');

  document.getElementById('sidebarName').textContent = r.name;
  document.getElementById('sidebarRole').textContent = r.label;
  document.getElementById('topUserIcon').textContent = r.emoji;
  buildNav();
  showPage('dashboard');
}

function buildNav() {
  const nav = document.getElementById('navItems');
  nav.innerHTML = '';
  navConfig[currentRole].forEach(section => {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="nav-section">${section.section}</div>`;
    section.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (item.id === currentPage ? ' active' : '');
      el.innerHTML = `<span class="nav-icon">${item.icon}</span>${item.label}${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}`;
      el.onclick = () => showPage(item.id);
      sec.appendChild(el);
    });
    nav.appendChild(sec);
  });
}

function showPage(id) {
  currentPage = id;
  document.getElementById('topbarTitle').textContent = getPageTitle(id);
  buildNav();
  const container = document.getElementById('pageContainer');
  container.innerHTML = `<div class="page active" id="page_${id}">${buildPage(id)}</div>`;
}

function getPageTitle(id) {
  const titles = { dashboard:'Dashboard', complaints:'Complaints', analytics:'Analytics', workers:'Workers & Teams', messages:'Messages', reviews:'Mass Reviews', ai_insights:'AI Insights', ai_priority:'AI Prioritization', tasks:'My Tasks', reports:'Send Reports', team:'Team Interaction', submit:'Submit Complaint', track:'Track Complaints', vote:'Vote & Support', nearby:'Nearby Issues', notifications:'Notifications', settings:'Settings' };
  return titles[id] || 'Dashboard';
}

// ========================

function buildPage(id) {
  if (currentRole === 'admin') return buildAdminPage(id);
  if (currentRole === 'worker') return buildWorkerPage(id);
  return buildApplicantPage(id);
}

function applicantTrack() {

  userComplaints.forEach(function(c){
    var steps = c.steps || [true,false,false,false,false];
    var stepLabels = ['Submitted','Reviewed','Assigned','In Work','Resolved'];
    var stepsHtml = stepLabels.map(function(step,i){
      var done = steps[i] ? 'done' : '';

      return '<div class="track-step '+done+' '+active+'">' +

function showErr(field) {
  var e = document.getElementById('err_' + field);
  var i = document.getElementById('f_' + field);
  if (e) e.style.display = 'block';
  if (i) i.style.borderColor = 'var(--red)';
}

function doSubmitComplaint() {
  var catEl     = document.getElementById('f_cat');
  var titleEl   = document.getElementById('f_title');
  var descEl    = document.getElementById('f_desc');
  var areaEl    = document.getElementById('f_area');
  var urgencyEl = document.getElementById('f_urgency');
  if (!catEl) return;

  var cat = catEl.value.trim();
  var title = titleEl.value.trim();
  var desc = descEl.value.trim();
  var area = areaEl.value.trim();
  var urgency = urgencyEl ? urgencyEl.value : 'medium';

  ['cat','title','desc','area'].forEach(function(k){
    var e = document.getElementById('err_'+k);
    var i = document.getElementById('f_'+k);
    if(e) e.style.display='none';
    if(i) i.style.borderColor='var(--border)';
  });

  var valid = true;
  if(!cat)             { showErr('cat');   valid=false; }
  if(title.length < 10){ showErr('title'); valid=false; }
  if(desc.length < 20) { showErr('desc');  valid=false; }
  if(!area)            { showErr('area');  valid=false; }
  if(!valid) return;

  var btn = document.getElementById('submitBtn');
  if(btn){ btn.textContent='Submitting...'; btn.disabled=true; btn.style.opacity='0.7'; }

  setTimeout(function(){
    var newId = '#CMP-' + (1048 + userComplaints.length);
    var dateStr = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});

    userComplaints.unshift({
      id:newId, title:title, cat:cat, status:'open',
      steps:[true,false,false,false,false],
      worker:'Pending Assignment', eta:'TBD', progress:5, area:area
    });
    complaints.unshift({
      id:newId, title:title, cat:cat, priority:urgency,
      status:'open', votes:0, area:area, date:dateStr, progress:5
    });

    var fb = document.getElementById('submitFormBox');
    var sb = document.getElementById('submitSuccess');
    if(fb) fb.style.display='none';
    if(sb){
      sb.style.display='block';
      var sid = document.getElementById('successId');
      var smsg = document.getElementById('successMsg');
      if(sid) sid.textContent = 'Complaint ID: ' + newId;
      if(smsg) smsg.innerHTML = '<strong style="color:var(--text)">' + title + '</strong><br>' +
        area + ' &bull; ' + cat + '<br><br>' +
        'Your complaint is live! The community can now vote to boost its priority.';
    }
  }, 1200);
}

  document.querySelectorAll('.chat-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  const nameEl = document.getElementById('chatName');
  if(nameEl) nameEl.textContent = name;
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  if(!input || !input.value.trim()) return;
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg sent';
  div.innerHTML = `<div class="msg-bubble">${input.value}</div><div class="msg-time">Just now</div>`;
  msgs.appendChild(div);
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;
  setTimeout(()=>{
    const r = document.createElement('div');
    r.className = 'msg recv';
    r.innerHTML = `<div class="msg-bubble">Got it, will look into this shortly.</div><div class="msg-time">Just now</div>`;
    msgs.appendChild(r);
    msgs.scrollTop = msgs.scrollHeight;
  }, 1200);
}

function toggleTask(id) {
  taskDone[id] = !taskDone[id];
  showPage(currentPage);
  toast(taskDone[id] ? '✅ Task marked complete!' : 'Task reopened');
}

function castVote(cid, btn) {
  if (userVoted[cid]) {
    toast('⚠️ You have already voted for this complaint!');
    return;
  }
  if (!userArea) {
    toast('⚠️ Please set your locality first to vote.');
    showPage('vote');
    return;
  }
  userVoted[cid] = true;
  votes[cid] = (votes[cid] || 0) + 1;

  // Update the complaint's vote count in global array too
  complaints.forEach(function(c){ if(c.id === cid) c.votes = votes[cid]; });

  btn.classList.add('voted');
  var vcountEl = btn.querySelector('.vcount');
  if (vcountEl) vcountEl.textContent = votes[cid];

  // Animate the card
  var cardId = 'vc_' + cid.replace('#','');
  var card = document.getElementById(cardId);
  if (card) {
    card.style.borderColor = 'var(--green)';
    setTimeout(function(){ card.style.borderColor = ''; }, 1500);
  }

  toast('🗳️ Vote cast for "' + cid + '"! Thank you for supporting your community!');
}

function submitComplaint() {
  closeModal('complaintModal');
  toast('✅ Complaint submitted! ID: #CMP-1047. AI prioritization active.');
}

function sendReport() {
  closeModal('reportModal');
  toast('📊 Report sent to applicant successfully!');
}

function showNotifModal() {
  const list = document.getElementById('notifList');
  list.innerHTML = buildNotifItems(currentRole, 5);
  document.getElementById('notifModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:12px 18px;border-radius:10px;font-size:13px;z-index:9999;animation:slideUp .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:320px';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
});

// Tab buttons (non-functional visual)
document.addEventListener('click', e => {
  if(e.target.classList.contains('tab-btn')) {
    e.target.closest('.tab-bar').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
  }
});
</script>
</body>
</html>
